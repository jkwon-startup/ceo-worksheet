<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1인 기업가 마케팅 검증 워크시트 (7종)</title>
<meta name="description" content="1인 기업가를 위한 마케팅 검증 워크시트 7종 — 사업 브리프 · 페르소나 · 메시지 · 오퍼 · 증거 · 채널 · 도구">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700;900&family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --ink: #2a2438;
  --ink-soft: #5c5470;
  --ink-muted: #8e8a9a;
  --cream: #faf8f5;
  --warm-white: #f5f0eb;
  --lavender-deep: #6b5b8a;
  --lavender-mid: #9584b0;
  --lavender-soft: #c8bdd9;
  --lavender-whisper: #ede8f5;
  --terracotta: #c17c5a;
  --terracotta-soft: #e8c4ad;
  --sage: #8fa68e;
  --sage-soft: #d4e0d3;
  --section-line: #ddd5c8;
  --input-bg: rgba(250, 248, 245, 0.7);
  --shadow-soft: 0 2px 20px rgba(42, 36, 56, 0.06);
  --shadow-card: 0 4px 30px rgba(42, 36, 56, 0.08);
  --radius: 12px;
  --radius-sm: 8px;
}

@font-face {
  font-family: 'Pretendard';
  src: url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
}

html { font-size: 16px; }

body {
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--cream);
  color: var(--ink);
  line-height: 1.8;
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
  padding-bottom: 8.5rem;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 0%, rgba(107, 91, 138, 0.04) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 100%, rgba(193, 124, 90, 0.03) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

/* ───────── HEADER ───────── */
.site-header {
  text-align: center;
  padding: 3.5rem 1.5rem 2rem;
  position: relative;
  z-index: 1;
}
.site-eyebrow {
  font-family: 'Noto Serif KR', serif;
  font-size: 0.8rem;
  letter-spacing: 0.2em;
  color: var(--lavender-deep);
  text-transform: uppercase;
  margin-bottom: 1rem;
}
.site-title {
  font-family: 'Noto Serif KR', serif;
  font-size: clamp(1.6rem, 4vw, 2.5rem);
  font-weight: 900;
  line-height: 1.35;
  color: var(--ink);
  margin-bottom: 0.6rem;
}
.site-sub {
  font-size: 0.95rem;
  color: var(--ink-soft);
  max-width: 560px;
  margin: 0 auto 1.6rem;
}
.overall-progress {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  background: #fff;
  border: 1px solid var(--lavender-soft);
  padding: 8px 20px;
  border-radius: 100px;
  box-shadow: var(--shadow-soft);
  font-size: 0.85rem;
  color: var(--ink-soft);
}
.overall-progress b { color: var(--lavender-deep); font-weight: 700; }
.op-bar {
  width: 120px; height: 6px;
  background: var(--lavender-whisper);
  border-radius: 100px; overflow: hidden;
}
.op-fill {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, var(--lavender-deep), var(--terracotta));
  transition: width 0.5s cubic-bezier(0.22, 1, 0.36, 1);
}
.header-actions { margin-top: 1.1rem; }
.btn-reset {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 16px; border-radius: 100px; cursor: pointer;
  background: transparent; border: 1.5px solid var(--section-line);
  color: var(--ink-muted); font-family: 'Pretendard', sans-serif;
  font-size: 0.8rem; font-weight: 500; transition: all 0.25s;
}
.btn-reset:hover { border-color: var(--terracotta); color: var(--terracotta); background: #fdf3ed; }

/* ───────── TABS ───────── */
.tabs-wrap {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(250, 248, 245, 0.92);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--section-line);
}
.tabs {
  max-width: 860px;
  margin: 0 auto;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 8px;
  padding: 12px 1.5rem;
}
.tab {
  flex: 0 0 auto;
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 8px 16px;
  border-radius: 100px;
  border: 1.5px solid var(--section-line);
  background: transparent;
  font-family: 'Pretendard', sans-serif;
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--ink-soft);
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.25s;
}
.tab:hover { border-color: var(--lavender-mid); color: var(--lavender-deep); }
.tab.active {
  background: var(--lavender-deep);
  border-color: var(--lavender-deep);
  color: #fff;
}
.tab .tab-check {
  width: 16px; height: 16px;
  border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 0.6rem; font-weight: 700;
  background: var(--sage); color: #fff;
  opacity: 0; transform: scale(0.5);
  transition: all 0.25s;
}
.tab.done .tab-check { opacity: 1; transform: scale(1); }
.tab.active.done .tab-check { background: #fff; color: var(--lavender-deep); }

/* ───────── PANELS ───────── */
.panel-wrap {
  max-width: 740px;
  margin: 0 auto;
  padding: 2.5rem 2rem 2rem;
  position: relative;
  z-index: 1;
}
.panel { display: none; animation: fadeUp 0.5s cubic-bezier(0.22, 1, 0.36, 1); }
.panel.active { display: block; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.panel-number {
  font-family: 'Noto Serif KR', serif;
  font-size: 0.75rem; font-weight: 600;
  color: var(--lavender-mid);
  letter-spacing: 0.15em;
  margin-bottom: 0.6rem;
}
.panel-title {
  font-family: 'Noto Serif KR', serif;
  font-size: clamp(1.4rem, 3.5vw, 1.9rem);
  font-weight: 700; color: var(--ink);
  line-height: 1.4; margin-bottom: 0.4rem;
}
.panel-time {
  font-size: 0.8rem; color: var(--ink-muted); margin-bottom: 1.5rem;
}
.panel-time span {
  background: var(--warm-white); border: 1px solid var(--section-line);
  padding: 3px 12px; border-radius: 100px;
}

.coaching-note {
  background: var(--lavender-whisper);
  border-left: 3px solid var(--lavender-mid);
  padding: 1.1rem 1.4rem;
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  margin-bottom: 2.5rem;
  font-size: 0.88rem; color: var(--ink-soft);
  line-height: 1.85;
}
.coaching-note.warn { background: #fdf3ed; border-left-color: var(--terracotta); }

/* Import (1주차 업로드/붙여넣기) */
.import-box {
  background: linear-gradient(135deg, var(--lavender-whisper) 0%, #faf5f0 100%);
  border: 1.5px solid var(--lavender-soft);
  border-radius: var(--radius); padding: 1.2rem 1.3rem;
}
.import-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 0.85rem; }
.import-btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 9px 18px; border-radius: 100px; cursor: pointer;
  background: var(--lavender-deep); color: #fff; font-size: 0.85rem; font-weight: 500;
  transition: all 0.25s;
}
.import-btn:hover { background: var(--ink); transform: translateY(-1px); }
.import-or { font-size: 0.82rem; color: var(--ink-muted); }
.import-file-name { font-size: 0.82rem; color: var(--sage); font-weight: 600; }

/* ───────── BLOCKS ───────── */
.block { margin-bottom: 2.4rem; }
.block-label {
  font-family: 'Noto Serif KR', serif;
  font-size: 1.05rem; font-weight: 600;
  color: var(--ink); margin-bottom: 0.3rem; line-height: 1.6;
}
.block-sub {
  font-size: 0.84rem; color: var(--ink-muted);
  margin-bottom: 1rem; line-height: 1.7;
}
.block-tip {
  font-size: 0.82rem; color: var(--terracotta);
  margin-top: 0.7rem; line-height: 1.7;
}

textarea, input[type="text"] {
  width: 100%;
  padding: 0.9rem 1.1rem;
  background: var(--input-bg);
  border: 1.5px solid var(--section-line);
  border-radius: var(--radius-sm);
  font-family: 'Pretendard', sans-serif;
  font-size: 0.95rem; line-height: 1.8; color: var(--ink);
  resize: vertical; transition: all 0.3s;
}
textarea:focus, input[type="text"]:focus {
  outline: none; border-color: var(--lavender-mid);
  box-shadow: 0 0 0 3px rgba(107, 91, 138, 0.08); background: #fff;
}
textarea::placeholder, input[type="text"]::placeholder {
  color: var(--ink-muted); font-style: italic; font-size: 0.88rem;
}
textarea.short { min-height: 72px; }
textarea.medium { min-height: 120px; }

/* Fill blank */
.fill-blank {
  display: flex; align-items: baseline; gap: 4px; flex-wrap: wrap;
  font-family: 'Noto Serif KR', serif; font-size: 1.02rem;
  line-height: 2.2; color: var(--ink); margin-bottom: 0.4rem;
}
.fill-blank input {
  border: none; border-bottom: 2px solid var(--lavender-soft);
  background: transparent; padding: 2px 8px;
  font-family: 'Noto Serif KR', serif; font-size: 1.02rem;
  color: var(--lavender-deep); min-width: 120px; flex: 1;
  transition: border-color 0.3s; border-radius: 0;
}
.fill-blank input:focus { outline: none; border-bottom-color: var(--lavender-deep); }

/* Fields grid */
.fields { display: flex; flex-direction: column; gap: 0.9rem; }
.field-row {
  display: grid; grid-template-columns: 130px 1fr;
  align-items: center; gap: 1rem;
}
.field-row > label {
  font-size: 0.88rem; font-weight: 500; color: var(--ink-soft);
}
.field-row .field-input { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.field-suffix { font-size: 0.85rem; color: var(--ink-muted); }

/* Tables */
.ws-table-wrap { overflow-x: auto; margin-bottom: 0.4rem; }
table.ws-table {
  width: 100%; border-collapse: collapse; font-size: 0.88rem;
  background: #fff; border-radius: var(--radius-sm); overflow: hidden;
  box-shadow: var(--shadow-soft);
}
table.ws-table th {
  background: var(--lavender-whisper); color: var(--lavender-deep);
  font-weight: 600; padding: 10px 12px; text-align: left;
  font-size: 0.8rem; border-bottom: 1px solid var(--section-line);
}
table.ws-table td {
  padding: 8px 10px; border-bottom: 1px solid var(--lavender-whisper);
  vertical-align: middle;
}
table.ws-table tr:last-child td { border-bottom: none; }
table.ws-table td.cell-static { color: var(--ink-soft); white-space: nowrap; }
table.ws-table input[type="text"] {
  padding: 7px 10px; font-size: 0.85rem; min-width: 80px;
}
table.ws-table .cell-checks { display: flex; flex-direction: column; gap: 4px; }

/* Checks (radio/checkbox) */
.options { display: flex; flex-direction: column; gap: 8px; }
.opt {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 11px 14px; border: 1.5px solid var(--section-line);
  border-radius: var(--radius-sm); background: var(--input-bg);
  cursor: pointer; transition: all 0.2s; font-size: 0.9rem;
  color: var(--ink-soft); line-height: 1.6;
}
.opt:hover { border-color: var(--lavender-mid); }
.opt input { margin-top: 4px; accent-color: var(--lavender-deep); cursor: pointer; width: 16px; height: 16px; flex-shrink: 0; }
.opt:has(input:checked) {
  border-color: var(--lavender-deep); background: var(--lavender-whisper);
  color: var(--ink); font-weight: 500;
}
.opt .opt-body { flex: 1; }
.opt .opt-desc { display: block; font-size: 0.78rem; color: var(--ink-muted); font-weight: 400; margin-top: 3px; line-height: 1.5; }
.opt-text {
  margin-top: 7px; width: 100%;
  border: none; border-bottom: 1.5px solid var(--lavender-soft);
  background: transparent; padding: 3px 4px; font-size: 0.85rem;
  color: var(--lavender-deep); border-radius: 0;
}
.opt-text:focus { outline: none; border-bottom-color: var(--lavender-deep); }
.opt.inline-checks { padding: 8px 11px; font-size: 0.82rem; }

/* Tags */
.keyword-tags { display: flex; gap: 0.8rem; flex-wrap: wrap; }
.keyword-tags input {
  flex: 1; min-width: 120px; padding: 0.6rem 1rem;
  border: 1.5px dashed var(--lavender-soft); border-radius: 100px;
  background: var(--lavender-whisper); font-family: 'Pretendard', sans-serif;
  font-size: 0.9rem; text-align: center; color: var(--lavender-deep);
  font-weight: 500; transition: all 0.3s;
}
.keyword-tags input:focus {
  outline: none; border-style: solid; border-color: var(--lavender-deep);
  background: #fff; box-shadow: 0 0 0 3px rgba(107, 91, 138, 0.1);
}

/* Checklist */
.checklist {
  background: #fff; border: 1px solid var(--lavender-soft);
  border-radius: var(--radius); padding: 1.6rem 1.8rem;
  margin-top: 2.5rem; box-shadow: var(--shadow-card); position: relative; overflow: hidden;
}
.checklist::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
  background: linear-gradient(90deg, var(--lavender-deep), var(--terracotta), var(--sage));
}
.checklist h3 {
  font-family: 'Noto Serif KR', serif; font-size: 1.05rem;
  font-weight: 700; color: var(--ink); margin-bottom: 1rem;
}
.checklist-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 7px 0; font-size: 0.9rem; color: var(--ink-soft);
  cursor: pointer; line-height: 1.6;
}
.checklist-item input { margin-top: 4px; accent-color: var(--sage); width: 17px; height: 17px; cursor: pointer; flex-shrink: 0; }
.checklist-item:has(input:checked) { color: var(--ink-muted); text-decoration: line-through; text-decoration-color: var(--lavender-soft); }
.checklist-footer {
  margin-top: 1rem; padding-top: 1rem; border-top: 1px dashed var(--section-line);
  font-size: 0.85rem; color: var(--lavender-deep); line-height: 1.7;
}

/* ───────── ACTION BAR ───────── */
.action-bar {
  position: fixed; bottom: 0; left: 0; width: 100%;
  background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(12px);
  border-top: 1px solid var(--section-line); z-index: 200;
  box-shadow: 0 -2px 20px rgba(42, 36, 56, 0.05);
}
.action-bar-inner {
  max-width: 860px; margin: 0 auto; padding: 12px 1.5rem;
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.nav-btns { display: flex; gap: 8px; }
.dl-btns { display: flex; gap: 8px; margin-left: auto; flex-wrap: wrap; }
.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 10px 18px; border-radius: 100px;
  font-family: 'Pretendard', sans-serif; font-size: 0.85rem; font-weight: 500;
  cursor: pointer; transition: all 0.25s; border: none; text-decoration: none;
}
.btn-primary { background: var(--lavender-deep); color: #fff; }
.btn-primary:hover { background: var(--ink); transform: translateY(-2px); box-shadow: 0 6px 18px rgba(42, 36, 56, 0.15); }
.btn-secondary { background: transparent; color: var(--ink-soft); border: 1.5px solid var(--section-line); }
.btn-secondary:hover:not(:disabled) { border-color: var(--lavender-mid); color: var(--lavender-deep); }
.btn-secondary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-ghost { background: var(--warm-white); color: var(--lavender-deep); border: 1.5px solid var(--lavender-soft); }
.btn-ghost:hover { background: var(--lavender-whisper); }

/* Save indicator */
.save-indicator {
  position: fixed; bottom: 5.5rem; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--ink); color: #fff; padding: 9px 22px;
  border-radius: 100px; font-size: 0.8rem; font-weight: 500;
  z-index: 1000; transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  pointer-events: none;
}
.save-indicator.show { transform: translateX(-50%) translateY(0); }

/* Responsive */
@media (max-width: 768px) {
  body { padding-bottom: 9rem; }
  .panel-wrap { padding: 2rem 1.2rem; }
  .field-row { grid-template-columns: 1fr; gap: 0.4rem; align-items: flex-start; }
  .field-row > label { margin-bottom: 0; }
  .keyword-tags { flex-direction: column; }
  .keyword-tags input { min-width: auto; }
  .dl-btns { margin-left: 0; width: 100%; }
  .action-bar-inner { gap: 8px; }
  .btn { padding: 9px 14px; font-size: 0.8rem; }
}

@media print {
  .tabs-wrap, .action-bar, .save-indicator, .overall-progress { display: none !important; }
  .panel { display: block !important; page-break-after: always; animation: none; }
  body { padding-bottom: 0; }
  textarea, input[type="text"] { border: 1px solid #ccc !important; }
  body::before { display: none; }
}
</style>
</head>

<header class="site-header">
  <p class="site-eyebrow">1인 기업가 마케팅 검증</p>
  <h1 class="site-title">마케팅 워크시트</h1>
  <p class="site-sub">1·2주차 산출물을 옮기고 빈칸을 채우면, 6강 마스터 시트가 빠르게 떨어집니다. 작성 내용은 이 브라우저에 자동 저장됩니다.</p>
  <div class="overall-progress">
    <span>전체 진행</span>
    <span class="op-bar"><span class="op-fill" id="opFill"></span></span>
    <span><b id="opDone">0</b> / <span id="opTotal">0</span> 완료</span>
  </div>
  <div class="header-actions">
    <button class="btn-reset" onclick="resetAll()">🆕 새 프로젝트 (전체 비우고 새로 시작)</button>
  </div>
</header>

<div class="tabs-wrap">
  <div class="tabs" id="tabs"></div>
</div>

<div class="panel-wrap" id="panels"></div>

<div class="action-bar">
  <div class="action-bar-inner">

      <button class="btn btn-secondary" id="prevBtn" onclick="go(-1)">◀ 이전</button>
      <button class="btn btn-secondary" id="nextBtn" onclick="go(1)">다음 ▶</button>

    <div class="dl-btns">

/* ════════════════════════════════════════════

   block types: text | fill | fields | table | radio | checks | tags | checklist
   ════════════════════════════════════════════ */
const WS = [
/* ── 01 ── */
{
  n: '01', tab: '사업 브리프', time: '15분',
  title: '01 · Business Brief — 사업 한 줄 요약',
  note: '이 워크시트는 마케터 AI가 <b>가장 먼저 읽는</b> 자료입니다. 1주차 산출물에서 가져올 수 있는 건 그대로 옮기고, 빈 칸만 채우세요.',
  blocks: [

    { type:'table', label:'2. 핵심 가치 3개', sub:'(1주차 04_brand_strategy.md에서 그대로) — 가치만 적으세요',
      headers:['#','핵심 가치'],
      rows:[
        ['1', {input:'w1_value1_name'}],

/* ════════════════════════════════════════════
   RENDER
   ════════════════════════════════════════════ */
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function inputCell(c) {
  if (c == null) return '<td></td>';
  if (typeof c === 'string') return `<td class="cell-static">${esc(c)}</td>`;
  if (c.static !== undefined) return `<td class="cell-static">${esc(c.static)}</td>`;
  if (c.input) return `<td><input type="text" data-key="${c.input}" placeholder="${esc(c.ph||'')}"></td>`;
  if (c.checks) {
    const inner = c.checks.map(ch => `<label class="opt inline-checks"><input type="checkbox" data-key="${ch.key}"><span class="opt-body">${esc(ch.label)}</span></label>`).join('');
    return `<td><div class="cell-checks">${inner}</div></td>`;
  }
  return '<td></td>';
}

function renderOptions(name, options) {
  return options.map(o => {
    const textInput = o.text ? `<input type="text" class="opt-text" data-key="${o.text}" placeholder="자유 입력">` : '';
    if (name) { // radio
      return `<label class="opt"><input type="radio" name="${name}" data-radio="${name}" value="${esc(o.value)}">`
        + `<span class="opt-body">${esc(o.label)}${o.desc?`<span class="opt-desc">${esc(o.desc)}</span>`:''}</span></label>`;
    }
    return `<label class="opt"><input type="checkbox" data-key="${o.key}">`
      + `<span class="opt-body">${esc(o.label)}${o.desc?`<span class="opt-desc">${esc(o.desc)}</span>`:''}${textInput}</span></label>`;
  }).join('');
}

function renderField(f) {
  let input = '';
  if (f.kind === 'text') {
    input = `<input type="text" data-key="${f.key}" placeholder="${esc(f.ph||'')}">`
      + (f.suffix?`<span class="field-suffix">${esc(f.suffix)}</span>`:'');
  } else if (f.kind === 'textarea') {
    input = `<textarea class="short" data-key="${f.key}" placeholder="${esc(f.ph||'')}"></textarea>`;
  } else if (f.kind === 'radio') {
    input = `<div class="options" style="flex-direction:row;flex-wrap:wrap;gap:6px;">${renderOptions(f.name, f.options)}</div>`;
  } else if (f.kind === 'checks') {
    input = `<div class="options" style="flex-direction:row;flex-wrap:wrap;gap:6px;">${renderOptions(null, f.options)}</div>`;
  }
  return `<div class="field-row"><label>${esc(f.label)}</label><div class="field-input">${input}</div></div>`;
}

function renderBlock(b) {
  const head = (b.label?`<div class="block-label">${b.label}</div>`:'')
    + (b.sub?`<div class="block-sub">${esc(b.sub)}</div>`:'');
  const tip = b.tip?`<div class="block-tip">${esc(b.tip)}</div>`:'';
  let body = '';
  switch (b.type) {
    case 'text':
      body = `<textarea class="${b.size||'short'}" data-key="${b.key}" placeholder="${esc(b.ph||'')}"></textarea>`;
      break;
    case 'import':
      body = `<div class="import-box">`
        + `<div class="import-row">`
        + `<label class="import-btn">📂 파일 업로드 (.md/.txt)<input type="file" accept=".md,.markdown,.txt,text/plain" onchange="loadImportFile(this,'${b.key}')" hidden></label>`
        + `<span class="import-or">또는 아래에 붙여넣기 ↓</span>`
        + `<span class="import-file-name" id="${b.key}_name"></span>`
        + `</div>`
        + `<textarea class="medium" data-key="${b.key}" placeholder="${esc(b.ph||'')}"></textarea>`
        + `</div>`;
      break;
    case 'fill':
      body = `<div class="fill-blank"><span>${esc(b.before)}</span><input type="text" data-key="${b.key}" placeholder=""><span>${esc(b.after||'')}</span></div>`;
      break;
    case 'fields':
      body = `<div class="fields">${b.fields.map(renderField).join('')}</div>`;
      break;
    case 'table':
      body = `<div class="ws-table-wrap"><table class="ws-table"><thead><tr>${b.headers.map(h=>`<th>${esc(h)}</th>`).join('')}</tr></thead>`
        + `<tbody>${b.rows.map(r=>`<tr>${r.map(inputCell).join('')}</tr>`).join('')}</tbody></table></div>`;
      break;
    case 'radio':
      body = `<div class="options">${renderOptions(b.name, b.options)}</div>`;
      break;
    case 'checks':
      body = `<div class="options">${renderOptions(null, b.options)}</div>`;
      break;
    case 'tags':
      body = `<div class="keyword-tags">${b.keys.map((k,i)=>`<input type="text" data-key="${k}" placeholder="${esc(b.ph[i]||'')}">`).join('')}</div>`;
      break;
    case 'checklist':
      return `<div class="checklist"><h3>✅ ${esc(b.label)}</h3>`
        + b.items.map(it=>`<label class="checklist-item"><input type="checkbox" data-key="${it.key}" data-chk="1"><span>${esc(it.label)}</span></label>`).join('')
        + (b.footer?`<div class="checklist-footer">${esc(b.footer)}</div>`:'') + `</div>`;
  }
  return `<div class="block">${head}${body}${tip}</div>`;
}

function renderAll() {
  const tabs = document.getElementById('tabs');
  const panels = document.getElementById('panels');
  WS.forEach((ws, i) => {
    tabs.insertAdjacentHTML('beforeend',
      `<button class="tab" data-i="${i}" onclick="switchTab(${i})"><span class="tab-check">✓</span><span>${ws.n} ${esc(ws.tab)}</span></button>`);
    const blocksHtml = ws.blocks.map(renderBlock).join('');
    panels.insertAdjacentHTML('beforeend',
      `<section class="panel" data-i="${i}">`
      + `<p class="panel-number">WORKSHEET ${ws.n}</p>`
      + `<h2 class="panel-title">${esc(ws.title)}</h2>`
      + `<p class="panel-time"><span>⏱ ${esc(ws.time)}</span></p>`
      + `<div class="coaching-note${ws.noteWarn?' warn':''}">${ws.note}</div>`
      + blocksHtml + `</section>`);
  });
}

/* ════════════════════════════════════════════
   STATE: tab nav / save / restore / progress
   ════════════════════════════════════════════ */
const STORAGE_KEY = 'ceo_worksheet_7';
const TAB_KEY = 'ceo_worksheet_7_tab';
let current = 0;

function switchTab(i) {
  current = i;
  document.querySelectorAll('.tab').forEach((t,idx)=>t.classList.toggle('active', idx===i));
  document.querySelectorAll('.panel').forEach((p,idx)=>p.classList.toggle('active', idx===i));
  document.getElementById('prevBtn').disabled = (i===0);
  document.getElementById('nextBtn').disabled = (i===WS.length-1);
  // move active tab into view
  const at = document.querySelector(`.tab[data-i="${i}"]`);
  if (at) at.scrollIntoView({behavior:'smooth', block:'nearest', inline:'center'});
  window.scrollTo({top:0, behavior:'smooth'});
  try { localStorage.setItem(TAB_KEY, String(i)); } catch(e){}
}
function go(d) {
  const ni = current + d;
  if (ni>=0 && ni<WS.length) switchTab(ni);
}

let saveTimeout;
function saveData() {
  const data = {};
  document.querySelectorAll('[data-key]').forEach(el=>{
    if (el.type==='checkbox') data[el.dataset.key] = el.checked;
    else data[el.dataset.key] = el.value;
  });
  document.querySelectorAll('[data-radio]').forEach(el=>{
    if (el.checked) data[el.dataset.radio] = el.value;
  });
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); showSaveIndicator(); } catch(e){}
}
function restoreData() {
  let data = {};
  try { data = JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}'); } catch(e){ data={}; }
  document.querySelectorAll('[data-key]').forEach(el=>{
    const v = data[el.dataset.key];
    if (v===undefined) return;
    if (el.type==='checkbox') el.checked = !!v;
    else el.value = v;
  });
  document.querySelectorAll('[data-radio]').forEach(el=>{
    if (data[el.dataset.radio] === el.value) el.checked = true;
  });
}
function showSaveIndicator() {
  const el = document.getElementById('saveIndicator');
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(()=>el.classList.remove('show'), 1800);
}

function updateProgress() {
  let done = 0;
  WS.forEach((ws, i) => {
    const cl = ws.blocks.find(b=>b.type==='checklist');
    if (!cl) return;
    const all = cl.items.every(it => {
      const el = document.querySelector(`[data-key="${it.key}"]`);
      return el && el.checked;
    });
    const tab = document.querySelector(`.tab[data-i="${i}"]`);
    if (tab) tab.classList.toggle('done', all);
    if (all) done++;
  });
  document.getElementById('opDone').textContent = done;
  document.getElementById('opTotal').textContent = WS.length;
  document.getElementById('opFill').style.width = (done/WS.length*100) + '%';
}

/* ════════════════════════════════════════════
   DOWNLOAD (md / txt) — config 단일 소스 직렬화
   ════════════════════════════════════════════ */
const val = k => { const el=document.querySelector(`[data-key="${k}"]`); return el?(el.value||'').trim():''; };
const chk = k => { const el=document.querySelector(`[data-key="${k}"]`); return !!(el&&el.checked); };
const radioVal = name => { const el=document.querySelector(`[data-radio="${name}"]:checked`); return el?el.value:''; };

function box(on){ return on ? '[x]' : '[ ]'; }

function serializeBlock(b, fmt) {
  const md = fmt==='md';
  let out = [];
  const lbl = b.label ? b.label.replace(/<[^>]+>/g,'') : '';
  switch (b.type) {
    case 'import':
    case 'text': {
      const v = val(b.key);
      out.push(md?`**${lbl}**`:`[${lbl}]`);
      out.push(v || (md?'> _(미작성)_':'(미작성)'));
      break;
    }
    case 'fill': {
      out.push(`${b.before} ${val(b.key)||'____'} ${b.after||''}`.trim());
      break;
    }
    case 'fields': {
      if (lbl) out.push(md?`**${lbl}**`:`[${lbl}]`);
      b.fields.forEach(f=>{
        if (f.kind==='radio') out.push(`- ${f.label}: ${radioVal(f.name)||'(미선택)'}`);
        else if (f.kind==='checks') {
          const sel = f.options.filter(o=>chk(o.key)).map(o=>o.label.replace(/:$/,'')+(o.text?` ${val(o.text)}`:'')).join(', ');
          out.push(`- ${f.label}: ${sel||'(없음)'}`);
        } else out.push(`- ${f.label}: ${val(f.key)||'____'}`);
      });
      break;
    }
    case 'table': {
      if (lbl) out.push(md?`**${lbl}**`:`[${lbl}]`);
      if (md) {
        out.push('| ' + b.headers.join(' | ') + ' |');
        out.push('| ' + b.headers.map(()=>'---').join(' | ') + ' |');
      }
      b.rows.forEach(r=>{
        const cells = r.map(c=>{
          if (c==null) return '';
          if (typeof c==='string') return c;
          if (c.static!==undefined) return c.static;
          if (c.input) return val(c.input)||'';
          if (c.checks) return c.checks.filter(x=>chk(x.key)).map(x=>x.label).join('/')||'';
          return '';
        });
        out.push(md ? '| ' + cells.join(' | ') + ' |' : '  · ' + cells.filter(Boolean).join(' / '));
      });
      break;
    }
    case 'radio': {
      out.push(md?`**${lbl}**`:`[${lbl}]`);
      const sel = radioVal(b.name);
      b.options.forEach(o=>{
        const on = (o.value===sel);
        out.push(md?`- ${box(on)} ${o.label.replace(/<[^>]+>/g,'')}` : `  ${on?'■':'□'} ${o.label.replace(/<[^>]+>/g,'')}`);
      });
      break;
    }
    case 'checks': {
      out.push(md?`**${lbl}**`:`[${lbl}]`);
      b.options.forEach(o=>{
        const on = chk(o.key);
        const t = o.text&&val(o.text)?` ${val(o.text)}`:'';
        out.push(md?`- ${box(on)} ${o.label}${t}` : `  ${on?'■':'□'} ${o.label}${t}`);
      });
      break;
    }
    case 'tags': {
      out.push(md?`**${lbl}**`:`[${lbl}]`);
      out.push(b.keys.map(k=>val(k)||'____').join(' · '));
      break;
    }
    case 'checklist': {
      out.push(md?`**✅ ${b.label}**`:`[✅ ${b.label}]`);
      b.items.forEach(it=> out.push(md?`- ${box(chk(it.key))} ${it.label}`:`  ${chk(it.key)?'■':'□'} ${it.label}`));
      if (b.footer) out.push(md?`\n> ${b.footer}`:b.footer);
      break;
    }
  }
  return out.join('\n');
}

function buildDoc(fmt) {
  const md = fmt==='md';
  const date = new Date().toLocaleDateString('ko-KR');
  let lines = [];
  if (md) {
    lines.push('# 1인 기업가 마케팅 검증 워크시트 (7종)');
    lines.push(`\n> 작성일: ${date}\n`);
  } else {
    lines.push('═══════════════════════════════════════');
    lines.push('  1인 기업가 마케팅 검증 워크시트 (7종)');
    lines.push(`  작성일: ${date}`);
    lines.push('═══════════════════════════════════════');
  }
  WS.forEach(ws=>{
    lines.push('');
    lines.push(md?`---\n\n## ${ws.title}`:`\n── ${ws.title} ──`);
    lines.push('');
    ws.blocks.forEach(b=>{ lines.push(serializeBlock(b, fmt)); lines.push(''); });
  });
  return lines.join('\n');
}

function loadImportFile(input, key) {
  const f = input.files && input.files[0];
  if (!f) return;
  const reader = new FileReader();
  reader.onload = e => {
    const ta = document.querySelector(`[data-key="${key}"]`);
    if (ta) { ta.value = e.target.result; saveData(); }
    const nm = document.getElementById(key + '_name');
    if (nm) nm.textContent = '✓ ' + f.name + ' 불러옴';
  };
  reader.readAsText(f);
  input.value = '';
}

function resetAll() {
  const ok = confirm('🆕 새 프로젝트를 시작할까요?\n\n지금까지 작성한 모든 내용이 이 브라우저에서 삭제되고\n빈 워크시트로 새로 시작합니다.\n\n되돌릴 수 없으니, 필요하면 먼저 [마크다운 저장] 또는 [텍스트 저장]으로 백업하세요.');
  if (!ok) return;
  try {
    localStorage.removeItem(STORAGE_KEY);
    localStorage.removeItem(TAB_KEY);
  } catch(e){}
  location.reload();
}

function downloadFile(fmt) {
  const text = buildDoc(fmt);
  const ext = fmt==='md'?'md':'txt';
  const blob = new Blob([text], {type:'text/plain;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `CEO워크시트7종_${new Date().toISOString().slice(0,10)}.${ext}`;
  a.click();
  URL.revokeObjectURL(url);
}

   INIT

renderAll();
restoreData();
updateProgress();
let startTab = 0;
try { startTab = parseInt(localStorage.getItem(TAB_KEY)||'0',10)||0; } catch(e){}
if (startTab<0 || startTab>=WS.length) startTab = 0;
switchTab(startTab);

document.addEventListener('input', e=>{
  if (!e.target.dataset.key && !e.target.dataset.radio) return;
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(saveData, 800);
});
document.addEventListener('change', e=>{
  if (e.target.dataset.key || e.target.dataset.radio) { saveData(); updateProgress(); }
});
